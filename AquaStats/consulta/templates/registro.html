<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AquaStatsJalisco</title>

    <!-- Bootstrap y Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <!--Estilos-->
    <style>
      :root{
        --brand-start:#007BFF;
        --brand-end:#1095f4;
      }
      body{
        background:#f8f9fa;
        background-image:
          radial-gradient(1000px 400px at -10% -10%, rgba(16,149,244,.08), transparent 60%),
          radial-gradient(800px 350px at 110% 110%, rgba(0,123,255,.08), transparent 60%);
        min-height:100vh;
        display:flex; flex-direction:column;
      }

      /* NAVBAR (no se altera comportamiento) */
      .navbar{ background:linear-gradient(90deg,var(--brand-start),var(--brand-end)); }
      .navbar-brand{ color:#fff!important; font-weight:700; font-size:1.4rem; }
      .nav-link{ color:#f8f9fa!important; transition:.2s; }
      .nav-link:hover{ color:#ffdd57!important; }

      /* Card */
      .auth-card{
        border:none;
        border-radius:1rem;
        box-shadow:0 12px 30px rgba(0,0,0,.1);
      }
      .auth-header{
        background:linear-gradient(90deg,rgba(0,123,255,.08),rgba(16,149,244,.08));
        border-top-left-radius:1rem;
        border-top-right-radius:1rem;
      }
      .btn-success{
        background:linear-gradient(90deg,#28a745,#2cc056);
        border:none;
      }
      .btn-success:hover{ filter:brightness(.95) }
      .muted-link{ color:#6c757d; text-decoration:none }
      .muted-link:hover{ color:#0d6efd }
      main{ flex:1 }
      .form-hint{ font-size:.875rem; color:#6c757d; }
    </style>
  </head>

  <body>
        <!--Navbar-->
        <nav class="navbar navbar-expand-lg shadow-sm">
            <div class="container">
                <a class="navbar-brand" href="/">
                  <i class="bi bi-droplet-half"></i> AquaStats
                </a>

                <button class="navbar-toggler text-white" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                  <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <div class="navbar-nav ms-auto">
                        {% if user.is_authenticated %}
                          <a class="nav-link" href="/perfil"><i class="bi bi-person-circle"></i> Perfil</a>
                          <a class="nav-link" href="/salir"><i class="bi bi-box-arrow-right"></i> Salir</a>
                        {% else %}
                          <a class="nav-link" href="/sesion"><i class="bi bi-box-arrow-in-right"></i> Iniciar sesión</a>
                          <a class="nav-link" href="/registro"><i class="bi bi-person-plus"></i> Registrarse</a>
                        {% endif %}
                    </div>
                </div>
            </div>
        </nav>
    <!--Fin navbar-->

        <!--Formulario-->
        <main class="container py-5">
            <div class="row justify-content-center">
                <div class="col-sm-10 col-md-8 col-lg-5">
                    {% if error %}<!--Error en pantalla-->
                      <div class="alert alert-danger shadow-sm">{{ error }}</div>
                    {% endif %}

                    <form method="POST" class="card auth-card">
                      {% csrf_token %}<!--Proteccion al Formulario-->
                      <div class="auth-header p-4 text-center">
                          <h1 class="h4 mb-0">
                            <i class="bi bi-person-plus pe-1"></i>
                            Registro
                          </h1>
                      </div>

                      <div class="card-body p-4 p-md-5">
                        <!-- Input de usuario -->
                        <div class="mb-3">
                            <label for="username" class="form-label">Usuario</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input
                                  type="text"
                                  name="username"
                                  id="username"
                                  class="form-control"
                                  placeholder="Escribe tu nombre de usuario"
                                  autocomplete="username"
                                  required
                                  autofocus
                                />
                            </div>
                        </div>
                        <!--Input del Correo-->
                        <div class="mb-3">
                           <label for="email" class="form-label">Correo electrónico</label>
                            <div class="input-group">
                              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                              <input
                                type="email"
                                name="email"
                                id="email"
                                class="form-control"
                                placeholder="example@dominio.com"
                                autocomplete="email"
                                required
                                value="{{ request.POST.email|default:'' }}"
                              />
                            </div>
                        </div>


                        <!-- Input de Contraseña 1 -->
                        <div class="mb-3">
                            <label for="password1" class="form-label">Contraseña</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                                <input
                                  type="password"
                                  name="password1"
                                  id="password1"
                                  class="form-control"
                                  placeholder="Escribe tu contraseña"
                                  autocomplete="new-password"
                                  required
                                />
                                <button class="btn btn-outline-secondary" type="button" id="togglePass1" aria-label="Mostrar u ocultar contraseña">
                                  <i class="bi bi-eye"></i>
                                </button>
                            </div>
                            <div class="form-hint mt-1">Usa al menos 8 caracteres. Se recomienda incluir números y letras.</div>
                        </div>

                        <!-- Input de Contraseña 2 -->
                        <div class="mb-2">
                            <label for="password2" class="form-label">Repite la contraseña</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-shield-lock-fill"></i></span>
                                <input
                                  type="password"
                                  name="password2"
                                  id="password2"
                                  class="form-control"
                                  placeholder="Vuelve a escribir tu contraseña"
                                  autocomplete="new-password"
                                  required
                                />
                                <button class="btn btn-outline-secondary" type="button" id="togglePass2" aria-label="Mostrar u ocultar contraseña">
                                  <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>

                        <div class="d-grid mt-4"><!--Envia el Formulario-->
                            <button class="btn btn-success btn-lg" type="submit">
                              <i class="bi bi-check2-circle me-1"></i> Enviar
                            </button>
                        </div>

                        <p class="text-center mt-4 mb-0"><!--Si no tiene cuenta lo redirige-->
                          ¿Ya cuentas con una cuenta?
                          <a href="/sesion" class="muted-link">Iniciar sesión</a>
                        </p>
                      </div>
                    </form>
                </div>
            </div>
        </main>

      <!--scripts de funciionamiento-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // Mostrar / ocultar contraseña
      const t1 = document.getElementById('togglePass1');
      const t2 = document.getElementById('togglePass2');
      const p1 = document.getElementById('password1');
      const p2 = document.getElementById('password2');

      function toggle(btn, input){
        const isPwd = input.type === 'password';
        input.type = isPwd ? 'text' : 'password';
        btn.innerHTML = isPwd ? '<i class="bi bi-eye-slash"></i>' : '<i class="bi bi-eye"></i>';
      }
      if (t1 && p1){ t1.addEventListener('click', () => toggle(t1, p1)); }
      if (t2 && p2){ t2.addEventListener('click', () => toggle(t2, p2)); }
    </script>
  </body>
</html>
