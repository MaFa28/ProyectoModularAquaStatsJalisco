<!DOCTYPE html> <!--Plantilla para todas las paginas-->
<html lang="es">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>AquaStatsJalisco</title>
        <!--Bootstrap-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <!--Iconos-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
        <style>
            body {
                background-color: #f8f9fa;
            }
            .navbar {
                background: linear-gradient(90deg, #007BFF, #1095f4);
            }
            .navbar-brand {
                color: #fff !important;
                font-weight: bold;
                font-size: 1.4rem;
            }
            .nav-link {
                color: #f8f9fa !important;
                transition: 0.3s;
            }
            .nav-link:hover {
                color: #ffdd57 !important;
            }
            .carousel-item img {
                height: 500px;
                object-fit: cover;
                border-radius: 10px;
            }
            .carousel-caption {
                background: rgba(0, 0, 0, 0.6);
                border-radius: 10px;
            }
            footer {
                margin-top: 50px;
                background: #007bff;
                color: white;
                text-align: center;
                padding: 10px 0;
            }
        </style>
    </head>
    
    <body>
            <nav class="navbar navbar-expand-lg shadow-sm">
                <div class="container">
                    <a class="navbar-brand" href="/">
                        <i class="bi bi-droplet-half"></i> AquaStats
                    </a>

                    <button class="navbar-toggler text-white" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse" id="navbarNav">
                        <div class="navbar-nav ms-auto">
                            {% if user.is_authenticated %}
                                <a class="nav-link" href="/salir"><i class="bi bi-box-arrow-right"></i> Salir</a>
                            {% else %}
                                <a class="nav-link" href="/sesion"><i class="bi bi-box-arrow-in-right"></i> Iniciar sesión</a>
                                <a class="nav-link" href="/registro"><i class="bi bi-person-plus"></i> Registrarse</a>
                            {% endif %}
                        </div>
                    </div>
                </div>
            </nav>
            <!--Fin del Navbar-->

            <main class="container"><!--Elementos de la vista para eliminar el Registro-->
                <div class="container mt-5">
                    <div class="alert alert-danger text-center"><!--Muestra la informacion del Registro a eliminar-->
                        <h4>¿Deseas eliminar este reporte?</h4>
                        <p><strong>{{ reporte.cantidad }} M3</strong> - {{ reporte.get_tipo_reporte_display }} - {{ reporte.fecha|date:"d/m/Y" }}</p>
                    </div>

                    <form method="POST"><!--Form para eliminar el Registro-->
                        {% csrf_token %}
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success">Eliminar</button><!--Boton para guardar la informacion-->
                            <a href="/perfil" class="btn btn-danger">Cancelar</a>
                        </div>
                    </form>
                </div>
            </main>
      
           
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </body>
</html>
