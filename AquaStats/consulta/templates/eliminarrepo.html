<!DOCTYPE html> <!--Plantilla para todas las paginas-->
<html lang="es">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>AquaStatsJalisco</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    </head>
    
    <body>
            <nav class="navbar navbar-expand-lg navbar-ligth" style="background-color: #1095f4ff;">
                <div class="container-fluid">
                    <a class="navbar-brand" href="/">AquaStats</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                        <div class="navbar-nav ms-auto">
                            {% if user.is_authenticated %}<!--Condicional para mostrar si el usuario esta logeado-->
                                <a class="nav-link" href="/salir">Salir</a>
                            {% else %}
                                <a class="nav-link" href="/sesion">Iniciar Sesion</a>
                                <a class="nav-link" href="/registro">Registro</a>
                            {% endif %}
                        </div>
                    </div>
                </div>
            </nav> <!--Barra de navegacion-->

            <main class="container"><!--Elementos de la vista para eliminar el Registro-->
                <div class="container mt-5">
                    <div class="alert alert-danger text-center"><!--Muestra la informacion del Registro a eliminar-->
                        <h4>¿Deseas eliminar este reporte?</h4>
                        <p><strong>{{ reporte.cantidad }} M3</strong> - {{ reporte.get_tipo_reporte_display }} - {{ reporte.fecha|date:"d/m/Y" }}</p>
                    </div>

                    <form method="POST"><!--Form para eliminar el Registro-->
                        {% csrf_token %}
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success">Eliminar</button><!--Boton para guardar la informacion-->
                            <a href="/perfil" class="btn btn-danger">Cancelar</a>
                        </div>
                    </form>
                </div>
            </main>
      
           
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </body>
</html>
