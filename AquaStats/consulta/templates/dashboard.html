<!DOCTYPE html> <!--Plantilla para todas las paginas-->
<html lang="es">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>AquaStatsJalisco</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
        <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    </head>
    
    <body>
            <nav class="navbar navbar-expand-lg navbar-ligth" style="background-color: #1095f4ff;">
                <div class="container-fluid">
                    <a class="navbar-brand" href="/">AquaStats</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                        <div class="navbar-nav ms-auto">
                            {% if user.is_authenticated %}<!--Condicional para mostrar si el usuario esta logeado-->
                                <a class="nav-link" href="/salir">Salir</a>
                            {% else %}
                                <a class="nav-link" href="/sesion">Iniciar Sesion</a>
                                <a class="nav-link" href="/registro">Registro</a>
                            {% endif %}
                        </div>
                    </div>
                </div>
            </nav> <!--Barra de navegacion-->

            <div class="container py-4"><!--Contiene el Dashboard-->

                <h2 class="text-center mb-4">Dashboard de Consumo de Agua</h2>

                <!-- Filtros -->
                <form method="get" class="row mb-4">
                    <div class="col-md-3"><!--Filtro por usuario-->
                        <label for="usuario" class="form-label">Usuario:</label>
                        <input type="text" id="usuario" name="usuario" class="form-control" placeholder="Buscar usuario">
                    </div>
                    <div class="col-md-4"><!--Filtro por tipo de reporte-->
                        <label for="tipo" class="form-label">Tipo de Reporte:</label>
                        <select name="tipo" id="tipo" class="form-select">
                            <option value="">Todos</option>
                            <option value="SEM">Semanal</option>
                            <option value="MES">Mensual</option>
                        </select>
                    </div>
                    <div class="col-md-4"><!--Filtro de region-->
                        <label for="region" class="form-label">Región:</label>
                        <input type="text" id="region" name="region" class="form-control" placeholder="Ejemplo: RCC">
                    </div>
                    <!--Botones para filtros o regresar al panel inicial-->
                    <div class="d-flex justify-content-center gap-2 mt-3">
                        <button class="btn btn-primary w-100 mb-1" type="submit">Filtrar</button>
                        <a href="/dashboard" class="btn btn-secondary w-100 mb-1">Limpiar</a>
                        <a href="/perfil" class="btn btn-danger w-100">Regresar</a>
                    </div>
                </form>

                <!-- Tabs para mostrar las graficas una a la vez -->
                <ul class="nav nav-tabs" id="grafTabs" role="tablist">
                    <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#graf1">Tendencia</a></li>
                    <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#graf2">Promedio</a></li>
                    <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#graf3">Región</a></li>
                    <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#graf4">Histograma</a></li>
                </ul>

                <div class="tab-content mt-3">
                    <div class="tab-pane fade show active" id="graf1"><div id="g1"></div></div>
                    <div class="tab-pane fade" id="graf2"><div id="g2"></div></div>
                    <div class="tab-pane fade" id="graf3"><div id="g3"></div></div>
                    <div class="tab-pane fade" id="graf4"><div id="g4"></div></div>
                </div>

                

            </div>
            <!--scripts para generar las graficas en la pantalla-->
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
            <script>
                const g1 = JSON.parse('{{ graf1|safe }}');
                const g2 = JSON.parse('{{ graf2|safe }}');
                const g3 = JSON.parse('{{ graf3|safe }}');
                const g4 = JSON.parse('{{ graf4|safe }}');

                Plotly.newPlot('g1', g1.data, g1.layout);
                Plotly.newPlot('g2', g2.data, g2.layout);
                Plotly.newPlot('g3', g3.data, g3.layout);
                Plotly.newPlot('g4', g4.data, g4.layout);
            </script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
        
    </body>
</html>
