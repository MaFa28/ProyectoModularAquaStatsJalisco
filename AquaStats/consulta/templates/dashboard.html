<!DOCTYPE html> <!--Plantilla para todas las paginas-->
<html lang="es">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>AquaStatsJalisco</title>
        <!--Bootstrap-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <!--Iconos-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
        <style>
            body {
                background-color: #f8f9fa;
            }
            .navbar {
                background: linear-gradient(90deg, #007BFF, #1095f4);
            }
            .navbar-brand {
                color: #fff !important;
                font-weight: bold;
                font-size: 1.4rem;
            }
            .nav-link {
                color: #f8f9fa !important;
                transition: 0.3s;
            }
            .nav-link:hover {
                color: #ffdd57 !important;
            }
            .carousel-item img {
                height: 500px;
                object-fit: cover;
                border-radius: 10px;
            }
            .carousel-caption {
                background: rgba(0, 0, 0, 0.6);
                border-radius: 10px;
            }
            footer {
                margin-top: 50px;
                background: #007bff;
                color: white;
                text-align: center;
                padding: 10px 0;
            }
        </style>
        <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    </head>
    
    <body>
            <!--Navbar-->
            <nav class="navbar navbar-expand-lg shadow-sm">
                <div class="container">
                    <a class="navbar-brand" href="/">
                        <i class="bi bi-droplet-half"></i> AquaStats
                    </a>

                    <button class="navbar-toggler text-white" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse" id="navbarNav">
                        <div class="navbar-nav ms-auto">
                            {% if user.is_authenticated %}
                                <a class="nav-link" href="/salir"><i class="bi bi-box-arrow-right"></i> Salir</a>
                            {% else %}
                                <a class="nav-link" href="/sesion"><i class="bi bi-box-arrow-in-right"></i> Iniciar sesión</a>
                                <a class="nav-link" href="/registro"><i class="bi bi-person-plus"></i> Registrarse</a>
                            {% endif %}
                        </div>
                    </div>
                </div>
            </nav>
            <!--Fin del Navbar-->

            <div class="container py-4"><!--Contiene el Dashboard-->

                <h2 class="text-center mb-4">Dashboard de Consumo de Agua</h2>

                <!-- Filtros -->
                <form method="get" class="row mb-4">
                    <div class="col-md-3"><!--Filtro por usuario-->
                        <label for="usuario" class="form-label">Usuario:</label>
                        <input type="text" id="usuario" name="usuario" class="form-control" placeholder="Buscar usuario">
                    </div>
                    <div class="col-md-4"><!--Filtro por tipo de reporte-->
                        <label for="tipo" class="form-label">Tipo de Reporte:</label>
                        <select name="tipo" id="tipo" class="form-select">
                            <option value="">Todos</option>
                            <option value="SEM">Semanal</option>
                            <option value="MES">Mensual</option>
                        </select>
                    </div>
                    <div class="col-md-4"><!--Filtro de region-->
                        <label for="region" class="form-label">Región:</label>
                        <input type="text" id="region" name="region" class="form-control" placeholder="Ejemplo: RCC">
                    </div>
                    <!--Botones para filtros o regresar al panel inicial-->
                    <div class="d-flex justify-content-center gap-2 mt-3">
                        <button class="btn btn-primary w-100 mb-1" type="submit">Filtrar</button>
                        <a href="/dashboard" class="btn btn-secondary w-100 mb-1">Limpiar</a>
                        <a href="/perfil" class="btn btn-danger w-100 mb-1">Regresar</a>
                        <a href="{% url 'regresion' %}" class="btn btn-warning w-100 mb-1">Analisis de regresion Individual</a>
                        <a href="{% url 'regresion_global' %}" class="btn btn-warning w-100 mb-1">Analisis de regresión Global</a>
                        <a href="{% url 'bayes' %}" class="btn btn-success w-100 ">Clasificacion de Bayes</a>
                    </div>

                </form>

                <!-- Tabs para mostrar las graficas una a la vez -->
                <ul class="nav nav-tabs" id="grafTabs" role="tablist">
                    <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#graf1">Tendencia</a></li>
                    <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#graf2">Promedio</a></li>
                    <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#graf3">Región</a></li>
                    <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#graf4">Histograma</a></li>
                </ul>

                <div class="tab-content mt-3">
                    <div class="tab-pane fade show active" id="graf1"><div id="g1"></div></div>
                    <div class="tab-pane fade" id="graf2"><div id="g2"></div></div>
                    <div class="tab-pane fade" id="graf3"><div id="g3"></div></div>
                    <div class="tab-pane fade" id="graf4"><div id="g4"></div></div>
                </div>

                

            </div>
            <!--scripts para generar las graficas en la pantalla-->
            <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
            <script>
                const g1 = JSON.parse('{{ graf1|escapejs }}');
                const g2 = JSON.parse('{{ graf2|escapejs }}');
                const g3 = JSON.parse('{{ graf3|escapejs }}');
                const g4 = JSON.parse('{{ graf4|escapejs }}');

                Plotly.newPlot('g1', g1.data, g1.layout);
                Plotly.newPlot('g2', g2.data, g2.layout);
                Plotly.newPlot('g3', g3.data, g3.layout);
                Plotly.newPlot('g4', g4.data, g4.layout);
            </script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
        
    </body>
</html>
