<!DOCTYPE html> <!--Plantilla para todas las paginas-->
<html lang="es">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>AquaStatsJalisco</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    </head>
    
    <body>
            <nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark" style="background-color: #e3f2fd;">
                <div class="container-fluid">
                    <a class="navbar-brand" href="/">AquaStats</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                        <div class="navbar-nav">
                            {% if user.is_authenticated %}<!--Condicional para mostrar si el usuario esta logeado-->
                                <a class="nav-link" href="/salir">Salir</a>
                                <a class="nav-link" href="#">Crear</a>
                                <a class="nav-link" href="/perfil">Perfil</a>
                            {% else %}
                                <a class="nav-link" href="/sesion">Iniciar Sesion</a>
                                <a class="nav-link" href="/registro">Registro</a>
                            {% endif %}
                        </div>
                    </div>
                </div>
            </nav> <!--Barra de navegacion-->

            <!--Inicio del formulario-->
            <main class="container">
                <div class="row">
                    <div class="col-md-4 offset-md-4">
                        <!--formulario-->
                        <form method="POST" class="card card-body mt-5">
                            <h1 class="text-center">Registra tu domicilio</h1>
                            {% csrf_token %}
                            {{ error }}
                            <div class="mb-3">{{ form }}</div>
                            <button class="btn btn-success">Enviar</button>
                        </form>
                    </div>
                </div>
            </main><!--Fin formulario-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
        
    </body>
</html>
