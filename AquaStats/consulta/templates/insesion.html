<!DOCTYPE html> <!--Plantilla para todas las paginas-->
<html lang="es">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>AquaStatsJalisco</title>
        <!--Bootstrap-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <!--Iconos-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

        <style>
                body {
                    background-color: #f8f9fa;
                }
                .navbar {
                    background: linear-gradient(90deg, #007BFF, #1095f4);
                }
                .navbar-brand {
                    color: #fff !important;
                    font-weight: bold;
                    font-size: 1.4rem;
                }
                .nav-link {
                    color: #f8f9fa !important;
                    transition: 0.3s;
                }
                .nav-link:hover {
                    color: #ffdd57 !important;
                }
                .carousel-item img {
                    height: 500px;
                    object-fit: cover;
                    border-radius: 10px;
                }
                .carousel-caption {
                    background: rgba(0, 0, 0, 0.6);
                    border-radius: 10px;
                }
                footer {
                    margin-top: 50px;
                    background: #007bff;
                    color: white;
                    text-align: center;
                    padding: 10px 0;
                }
        </style>
    </head>
    
    <body>
            <!--Navbar -->
            <nav class="navbar navbar-expand-lg shadow-sm">
                <div class="container">
                    <a class="navbar-brand" href="/"><!--Estilos del Icono AquaStats-->
                        <i class="bi bi-droplet-half"></i> AquaStats
                    </a>

                    <button class="navbar-toggler text-white" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse" id="navbarNav"><!--Iconos y elementos-->
                        <div class="navbar-nav ms-auto">
                            {% if user.is_authenticated %}<!--Validaciones si el usuario esta logeado-->
                                <a class="nav-link" href="/perfil"><i class="bi bi-person-circle"></i> Perfil</a>
                                <a class="nav-link" href="/salir"><i class="bi bi-box-arrow-right"></i> Salir</a>
                            {% else %}
                                <a class="nav-link" href="/sesion"><i class="bi bi-box-arrow-in-right"></i> Iniciar sesión</a>
                                <a class="nav-link" href="/registro"><i class="bi bi-person-plus"></i> Registrarse</a>
                            {% endif %}
                        </div>
                    </div>
                </div>
            </nav>
            <!--Fin del Navbar-->

            <!--Inicio formulario-->
            <main class="container">
                <div class="row">
                    <div class="col-md-4 offset-md-4">
                        {% if error %}
                            <div class="alert alert-danger">{{ error }}</div> <!--Error en Pantalla-->
                        {% endif %}
                        <!--formulario-->
                        <form method="POST" class="card card-body mt-5"><!--Envio de formulario-->
                            <h1 class="text-center">Inicio de Sesion</h1>
                            {% csrf_token %}<!--Token de autenticacion-->
                            <div class="mb-3"><!--Input de usuario-->
                                <label for="username">Usuario:</label>
                                <input type="text" name="username" id="username" class="form-control" placeholder="Ingresa tu usuario"></input>
                            </div>
                            <div class="mb-3"><!--Input Contraseña-->
                                <label for="password">Contraseña:</label>
                                <input type="password" name="password" id="password" class="form-control" placeholder="Ingresa tu contraseña"></input>
                            </div>
                            <button class="btn btn-success">Iniciar Sesion</button>
                        </form>
                        <p class="text-center mt-3"><!--Envia a la vista registro-->
                            ¿Aun no tienes una cuenta?<a href="/registro">Registrarse</a>
                        </p>
                    </div>
                </div>
            </main><!--Fin formulario-->

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
        
    </body>
</html>
